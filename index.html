<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Daily Brief">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<title>Daily Brief</title>
<style>
:root{
  --bg:#f5f7fb; --ink:#141a26; --muted:#6b7280; --line:#e6e9f0;
  --card:#ffffff; --shadow:0 1px 3px rgba(20,26,38,.06),0 4px 16px rgba(20,26,38,.05);
  --blue:#2563eb; --bluebg:#eaf0ff;
  --top:#d99a07; --hk:#e0322f; --us:#2563eb; --china:#b91c47;
  --global:#0d9488; --uae:#059669; --tech:#7c3aed; --crypto:#ea7317;
  --good:#16a34a; --steady:#d99a07; --weak:#dc2626;
  --up:#16a34a; --down:#dc2626; --flat:#9aa1ad;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:640px;margin:0 auto;padding:18px 16px 60px}
.kicker{font-size:14px;font-weight:600;color:var(--muted);margin:2px 0 2px}
h1{font-size:28px;font-weight:800;letter-spacing:-.5px;margin:0 0 6px}
.date{font-size:14px;color:var(--muted);font-weight:500}
.readpill{display:inline-block;margin-top:12px;background:var(--ink);color:#fff;font-size:12px;
  font-weight:600;padding:7px 13px;border-radius:999px;letter-spacing:.2px}
.sect{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
  color:var(--muted);margin:26px 4px 12px}
.three{display:flex;flex-direction:column;gap:10px}
.tcard{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:14px 15px;
  display:flex;align-items:center;gap:13px;cursor:pointer;border:1px solid var(--line);
  transition:transform .12s ease}
.tcard:active{transform:scale(.985)}
.tico{flex:0 0 40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center}
.tico svg{width:21px;height:21px}
.ttext{font-size:14.5px;font-weight:600;line-height:1.35}
.snapgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.tile{background:var(--card);border-radius:13px;box-shadow:var(--shadow);border:1px solid var(--line);
  padding:10px 9px 9px;text-align:left}
.tlabel{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tval{font-size:14px;font-weight:800;margin-top:5px;letter-spacing:-.2px}
.tchg{font-size:10.5px;font-weight:700;margin-top:3px}
.up{color:var(--up)} .down{color:var(--down)} .flat{color:var(--flat)}
.snapnote{font-size:11px;color:var(--muted);margin:9px 4px 0;font-weight:500}
.sticky{position:sticky;top:0;z-index:20;background:var(--bg);
  margin:22px -16px 0;padding:10px 16px 8px;border-bottom:1px solid var(--line)}
.tabs{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;font-size:13px;font-weight:700;padding:7px 13px;border-radius:999px;
  border:1.5px solid currentColor;background:#fff;cursor:pointer;white-space:nowrap;transition:all .12s}
.filters{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;margin-top:9px;padding-bottom:1px}
.filters::-webkit-scrollbar{display:none}
.fchip{flex:0 0 auto;font-size:12px;font-weight:600;padding:5px 12px;border-radius:999px;
  border:1px solid var(--line);background:#fff;color:var(--muted);cursor:pointer;white-space:nowrap}
.fchip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.pulse{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);
  box-shadow:var(--shadow);border-radius:14px;padding:12px 14px;margin-top:14px}
.mdot{font-size:13px;line-height:1}
.mword{font-weight:800;font-size:13.5px}
.pline{font-size:13px;color:#374151;font-weight:500;line-height:1.35}
.list{margin-top:14px;display:flex;flex-direction:column;gap:11px}
.card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);border:1px solid var(--line);
  border-left:4px solid var(--line);overflow:hidden}
.chead{padding:14px 15px;cursor:pointer}
.ctag{display:inline-block;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;
  padding:3px 9px;border-radius:999px;margin-bottom:9px}
.chl{font-size:16px;font-weight:700;line-height:1.32;margin:0;letter-spacing:-.2px}
.chl a{color:var(--ink);text-decoration:none}
.crow{display:flex;align-items:center;justify-content:space-between;margin-top:9px}
.csrc{font-size:11.5px;color:var(--muted);font-weight:600}
.exp{font-size:12px;color:var(--muted);font-weight:700}
.cbody{max-height:0;overflow:hidden;transition:max-height .28s ease}
.cbody.open{max-height:760px}
.cinner{padding:0 15px 15px}
.summary{font-size:14px;line-height:1.5;color:#374151;margin:2px 0 14px}
.wlabel{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:8px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{background:var(--bluebg);color:var(--blue);font-size:12px;font-weight:600;padding:5px 11px;border-radius:999px}
.srcdiv{border-top:1px solid var(--line);margin:15px 0 11px}
.srclabel{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:9px}
.srcrow{display:flex;align-items:center;justify-content:space-between}
.spill{font-size:12px;font-weight:700;padding:5px 12px;border-radius:999px;background:#eef1f6;color:#374151}
.spill.gold{background:#fbf1d6;color:#8a6a08}
.readlink{font-size:13px;font-weight:700;color:var(--blue);text-decoration:none}
.empty{text-align:center;color:var(--muted);font-size:14px;font-weight:500;padding:34px 10px;display:none}
.foot{margin-top:34px;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);line-height:1.6}
.foot b{color:#374151}
</style>
</head>
<body>
<div class="wrap">
  <div class="kicker">Good morning ☕️</div>
  <h1>Your Daily Brief</h1>
  <div class="date">Thursday 16 July 2026</div>
  <div class="readpill">≈ 6-min read · 20 stories · fresh (last 24h)</div>

  <div class="sect">3 things to know today</div>
  <div class="three" id="three"></div>

  <div class="sect">Market snapshot</div>
  <div class="snapgrid" id="snap"></div>
  <div class="snapnote">Snapshot at last close</div>

  <div class="sticky">
    <div class="tabs" id="tabs"></div>
    <div class="filters" id="filters"></div>
  </div>

  <div class="pulse" id="pulse">
    <span class="mdot" id="mdot">●</span>
    <span class="mword" id="mword"></span>
    <span class="pline" id="pline"></span>
  </div>

  <div class="list" id="list"></div>
  <div class="empty" id="empty">No stories match this filter. Try another topic or tab.</div>

  <div class="foot" id="foot"></div>
</div>

<script>
const CAT = {
  top:{color:'var(--top)',label:'Top Story'},
  hk:{color:'var(--hk)',label:'Hong Kong'},
  us:{color:'var(--us)',label:'United States'},
  china:{color:'var(--china)',label:'China'},
  global:{color:'var(--global)',label:'Global Markets'},
  uae:{color:'var(--uae)',label:'UAE'},
  tech:{color:'var(--tech)',label:'Technology / AI'},
  crypto:{color:'var(--crypto)',label:'Crypto'}
};
const TABS = ['all','top','hk','us','china','global','uae','tech','crypto'];
const TABNAME = {all:'All',top:'★ Top',hk:'Hong Kong',us:'US',china:'China',global:'Global',uae:'UAE',tech:'Tech/AI',crypto:'Crypto'};
const TOPICS = ['all','markets','banking','policy','tech','crypto','energy'];
const TOPICNAME = {all:'All topics',markets:'Markets',banking:'Banking',policy:'Policy',tech:'Tech',crypto:'Crypto',energy:'Energy'};

const PULSE = {
  all:['steady','Cooling US inflation lifts spirits, but softer China growth and a Hong Kong tech slump keep the mood in check.'],
  top:['steady','The day’s big stories pull in different directions, leaving investors hopeful yet watchful.'],
  hk:['weak','Hong Kong shares wobble through a rough patch even as policymakers roll out fresh support.'],
  us:['good','Easing price pressures put investors in a buoyant mood and lift the major benchmarks.'],
  china:['steady','Growth looks tired, yet a wave of central bank support helps steady nerves.'],
  global:['steady','Markets tread carefully, weighing softer inflation against patchy growth.'],
  uae:['good','Gulf markets feel upbeat as exchanges expand and the region draws fresh interest.'],
  tech:['good','Renewed faith in AI demand puts a spring back in the sector’s step.'],
  crypto:['weak','Digital assets stay under a cloud as rate worries keep buyers cautious.']
};
const MOOD = {good:['#16a34a','Good'],steady:['#d99a07','Steady'],weak:['#dc2626','Weak']};

const SNAP = [
  {l:'S&P 500',v:'7,572.40',c:'+0.38%',d:'up'},
  {l:'Nasdaq',v:'26,269',c:'+0.62%',d:'up'},
  {l:'Dow',v:'52,659',c:'+0.29%',d:'up'},
  {l:'Hang Seng',v:'24,681',c:'▼ worst wk',d:'down'},
  {l:'USD/CNY',v:'6.80',c:'steady',d:'flat'},
  {l:'Bitcoin',v:'~$58K',c:'▼ near lows',d:'down'},
  {l:'Dubai DFM',v:'+11%',c:'Q2 rebound',d:'up'},
  {l:'US 10-Yr',v:'4.55%',c:'▼ yields',d:'down'}
];

const ICONS = {
  chart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 15l4-5 3 3 5-7"/></svg>',
  bank:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10l9-6 9 6"/><path d="M4 10v9M20 10v9M9 10v9M15 10v9M2 21h20"/></svg>',
  globe:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 010 18M12 3a15 15 0 000 18"/></svg>'
};

const THREE = [
  {ico:'chart',bg:'var(--china)',text:'China’s growth slips below Beijing’s target, stoking bets on more stimulus.',tab:'china'},
  {ico:'bank',bg:'var(--us)',text:'US wholesale inflation unexpectedly cools, and stocks rally as Fed hike fears fade.',tab:'us'},
  {ico:'globe',bg:'var(--hk)',text:'Hong Kong unveils a road map with Beijing to expand its bond and offshore yuan markets.',tab:'hk'}
];

const STORIES = [
  {cat:'top',topic:'policy',hl:'China’s Q2 growth unexpectedly slips below Beijing’s target',url:'https://www.bloomberg.com/news/live-blog/2026-07-15/china-second-quarter-gdp-and-pboc-briefing',src:'Bloomberg',gold:true,
   sum:'China’s economy grew more slowly than Beijing planned last quarter, with second-quarter GDP unexpectedly slipping below the official target range. The miss piles fresh pressure on policymakers to add stimulus. Investors read it as a signal that more rate and reserve-ratio cuts are likely ahead.',
   why:['Stimulus bets','Yuan pressure','Asia earnings']},
  {cat:'top',topic:'markets',hl:'US wholesale inflation unexpectedly falls, powering a stock rally',url:'https://www.cnbc.com/2026/07/15/wholesale-inflation-june-2026-.html',src:'CNBC',
   sum:'US wholesale prices unexpectedly fell in June, with the producer price index down 0.3% against forecasts for no change. The soft reading eased fears that tariffs are stoking inflation. Traders trimmed bets on further Fed hikes, lifting major stock indexes and pulling Treasury yields lower.',
   why:['Fed on hold','Rate-cut odds','Risk-on']},
  {cat:'top',topic:'policy',hl:'Hong Kong, PBOC and SFC unveil road map to grow bond and yuan markets',url:'https://www.scmp.com/business/banking-finance/article/3337865/hong-kong-bond-markets-yuan-issuance-expand-2026-under-hkma-sfc-road-map',src:'SCMP',
   sum:'Hong Kong unveiled a joint road map with the PBOC and SFC to expand its bond market and offshore yuan issuance through 2026. The plan aims to cement the city as the leading hub for renminbi finance. New facilities and a trading platform sit at the centre of the push.',
   why:['RMB hub','Bond flows','IFC status']},

  {cat:'hk',topic:'banking',hl:'HKMA enlarges RMB Business Facility to 500 billion yuan',url:'https://www.hkma.gov.hk/eng/news-and-media/press-releases/2026/07/20260707-3/',src:'HKMA',
   sum:'The HKMA rolled out fresh measures to deepen mainland financial ties and support the offshore renminbi market. Its RMB Business Facility was enlarged from 200 billion to 500 billion yuan, with longer tenors added. Banks gain more liquidity to fund cross-border and yuan-denominated business.',
   why:['Bank liquidity','Cross-border','RMB depth']},
  {cat:'hk',topic:'policy',hl:'CFETS and HKEX to build electronic fixed-income and currency platform',url:'https://www.hkma.gov.hk/eng/news-and-media/press-releases/2026/07/20260707-8/',src:'HKMA',
   sum:'The PBOC, HKMA and SFC welcomed a tie-up between mainland trading system CFETS and HKEX to build an electronic fixed-income and currency platform in Hong Kong. It should widen global access to onshore bonds and yuan products. The venture reinforces the city’s cross-border role.',
   why:['Market access','Trading infra','Bond flows']},
  {cat:'hk',topic:'crypto',hl:'HKMA grants first stablecoin issuer licences to HSBC and a StanChart venture',url:'https://www.hkma.gov.hk/eng/news-and-media/press-releases/2026/04/20260410-4/',src:'HKMA',
   sum:'Hong Kong’s stablecoin regime advanced as the HKMA granted its first issuer licences, including an HSBC entity and a Standard Chartered–HKT–Animoca venture. Both plan HKD-referenced tokens for payments and tokenised assets. Regulated stablecoins are expected to launch within months under a deliberately high bar.',
   why:['Bank rails','Tokenisation','User safeguards']},
  {cat:'hk',topic:'markets',hl:'Hang Seng closes out its worst week in over a year on tech sell-off',url:'https://www.scmp.com/business/china-business/article/3358428/hang-seng-index-heads-worst-week-over-year-renewed-sell-engulfs-tech-names',src:'SCMP',
   sum:'The Hang Seng Index closed out its worst week in more than a year as a renewed sell-off engulfed technology names. The benchmark slid toward its lowest level in twelve months. Rate-hike worries and fading AI enthusiasm weighed heavily on Hong Kong-listed shares.',
   why:['Equity risk','Tech weighting','Fund flows']},
  {cat:'hk',topic:'banking',hl:'HKMA holds base rate steady after new Fed chair keeps policy unchanged',url:'https://www.scmp.com/business/article/3357482/hkma-keeps-rate-unchanged-new-fed-chair-holds-steady-rate-rise-expected-later-year',src:'SCMP',
   sum:'The HKMA held its base rate steady, tracking the Fed after the new US central bank chair kept policy unchanged. Officials still expect a rate rise later this year. The pause offers Hong Kong borrowers and the property market brief relief amid a fragile outlook.',
   why:['Mortgage costs','Property','Peg mechanics']},

  {cat:'us',topic:'markets',hl:'US stocks advance as cooling inflation lifts big tech',url:'https://www.cnbc.com/2026/07/14/stock-market-today-live-updates.html',src:'CNBC',
   sum:'US stocks advanced as cooling inflation lifted big technology shares. The S&P 500 and Nasdaq both closed higher, while the Dow added modest gains. Sentiment improved on hopes the Fed can hold rates steady without choking growth, keeping major indexes near recent highs.',
   why:['Megacap lift','Valuations','Momentum']},
  {cat:'us',topic:'markets',hl:'Treasury yields fall as traders react to encouraging inflation data',url:'https://www.cnbc.com/2026/07/15/treasury-yields-investors-producer-price-inflation-data.html',src:'CNBC',
   sum:'Treasury yields fell after softer producer-price data reinforced the view that inflation is easing. The 10-year note dipped toward the mid-4.5% area, with two-year yields sliding further. Lower yields eased pressure on rate-sensitive sectors and supported equity valuations across the board.',
   why:['Cheaper credit','Bond rally','Rate-sensitive']},
  {cat:'us',topic:'policy',hl:'Investors await retail sales and jobless claims for economy signal',url:'https://www.cnbc.com/2026/07/15/stock-market-today-live-updates.html',src:'CNBC',
   sum:'Investors turned cautious ahead of fresh US retail sales and weekly jobless-claims figures. The data should show whether spending is slowing enough to keep inflation contained without tipping the economy toward recession. Futures were little changed as traders awaited the readings.',
   why:['Consumer health','Soft landing','Fed path']},

  {cat:'china',topic:'policy',hl:'PBOC signals comfort with yuan levels, expects two-way moves',url:'https://www.bloomberg.com/news/articles/2026-07-15/pboc-signals-comfort-with-yuan-levels-expects-two-way-moves',src:'Bloomberg',gold:true,
   sum:'The PBOC signalled comfort with current yuan levels and said it expects continued two-way moves in the currency. Officials pushed back on calls for sharp appreciation, stressing the market’s role in setting the rate. The stance points to steady, managed currency policy ahead.',
   why:['FX stability','Trade tension','Reserve flows']},
  {cat:'china',topic:'banking',hl:'PBOC injects record 1.4 trillion yuan to smooth funding pressures',url:'https://www.bloomberg.com/news/articles/2026-07-14/pboc-boosts-liquidity-to-smooth-tax-payments-debt-issuance',src:'Bloomberg',gold:true,
   sum:'China’s central bank injected a record 1.4 trillion yuan through six-month reverse repos to smooth tax payments and heavy debt issuance. The move underscores efforts to keep money-market conditions loose. Ample liquidity should support bank lending and bond markets as growth momentum softens.',
   why:['Loose money','Bank funding','Bond demand']},
  {cat:'china',topic:'policy',hl:'China’s central bank signals reserve-ratio and rate cuts in 2026',url:'https://www.scmp.com/economy/china-economy/article/3339018/chinas-central-bank-signals-reserve-ratio-interest-rate-cuts-2026',src:'SCMP',
   sum:'China’s central bank signalled room for further reserve-ratio and interest-rate cuts this year. The guidance reflects concern that growth is losing steam and needs more support. Economists expect easing to arrive in stages, aimed at reviving credit demand and steadying the property sector.',
   why:['Easing cycle','Credit demand','Property support']},

  {cat:'tech',topic:'tech',hl:'Tech stocks climb on renewed optimism about AI chip demand',url:'https://www.bloomberg.com/news/newsletters/2026-07-15/tech-stocks-climb-on-renewed-optimism-about-ai-chip-demand',src:'Bloomberg',gold:true,
   sum:'Technology stocks climbed on renewed optimism about demand for AI chips. Upbeat signals on data-centre spending reassured investors after a bruising stretch for the sector. Chipmakers and megacap names led the rebound, helping broader indexes recover ground lost in recent sessions.',
   why:['Capex cycle','Chip demand','Index weight']},
  {cat:'tech',topic:'tech',hl:'AI back in focus as OpenAI preps its biggest consumer hardware push',url:'https://www.cnbc.com/video/2026/07/15/the-late-morning-rundown-july-15-2026.html',src:'CNBC',
   sum:'AI names returned to the spotlight as OpenAI prepared its biggest consumer hardware push yet. The move deepens competition to put generative AI directly into everyday devices. Investors are weighing the heavy spending required against the potential for a lucrative new revenue stream.',
   why:['New revenue','Device race','AI spend']},
  {cat:'tech',topic:'tech',hl:'Nvidia says Anthropic, OpenAI and SpaceX among first Vera chip users',url:'https://www.bloomberg.com/news/articles/2026-06-01/nvidia-says-anthropic-openai-among-big-users-of-new-vera-chip',src:'Bloomberg',gold:true,
   sum:'Nvidia said Anthropic, OpenAI and SpaceX are among the first big users of its upcoming Vera processor. The chips will power next-generation data centres built for demanding AI workloads. The endorsements underline Nvidia’s grip on the infrastructure behind the AI boom.',
   why:['Nvidia moat','Data centres','AI infra']},

  {cat:'global',topic:'markets',hl:'Global markets brace for a heavy week of inflation and growth data',url:'https://www.cnbc.com/2026/07/10/stock-market-next-week-outlook-for-july-13-17-2026.html',src:'CNBC',
   sum:'Global markets entered the week focused on a heavy run of inflation and growth data. Investors positioned around central bank signals from the US, China and beyond. Sentiment stayed cautious as traders balanced easing price pressures against softer economic momentum worldwide.',
   why:['Data risk','Central banks','Positioning']},

  {cat:'uae',topic:'markets',hl:'Abu Dhabi’s ADX lists new stock futures and deepens Bloomberg tie-up',url:'https://www.bloomberg.com/company/press/adx-lists-six-new-single-stock-futures-deepens-bloomberg-collaboration-to-expand-global-access-to-abu-dhabi-markets/',src:'Bloomberg',gold:true,
   sum:'Abu Dhabi’s securities exchange listed six new single-stock futures and deepened its collaboration with Bloomberg. The products span energy, AI, logistics and financial services, and are visible to hundreds of thousands of professionals globally. The push aims to widen international access to Gulf capital markets.',
   why:['Market access','Derivatives','Gulf inflows']},

  {cat:'crypto',topic:'crypto',hl:'Bitcoin languishes near multi-month lows as rate fears bite',url:'https://www.bloomberg.com/news/articles/2026-07-01/bitcoin-falls-to-21-month-low-on-strategy-rate-hike-fears',src:'Bloomberg',gold:true,
   sum:'Bitcoin languished near multi-month lows as rate-hike fears and inflation worries sapped risk appetite. A recent oil-price spike revived concerns that borrowing costs could stay higher for longer. Pressure on the largest corporate holders added to the cautious mood across digital assets.',
   why:['Risk appetite','Rate sensitivity','Corporate holders']}
];

let curTab='all', curTopic='all';

document.getElementById('three').innerHTML = THREE.map(t=>
  `<div class="tcard" data-tab="${t.tab}">
     <div class="tico" style="background:${t.bg}22;color:${t.bg}">${ICONS[t.ico]}</div>
     <div class="ttext">${t.text}</div>
   </div>`).join('');
document.querySelectorAll('.tcard').forEach(el=>el.addEventListener('click',()=>{
  setTab(el.dataset.tab); document.querySelector('.sticky').scrollIntoView({behavior:'smooth',block:'start'});
}));

document.getElementById('snap').innerHTML = SNAP.map(s=>
  `<div class="tile"><div class="tlabel">${s.l}</div>
   <div class="tval">${s.v}</div>
   <div class="tchg ${s.d}">${s.c}</div></div>`).join('');

document.getElementById('tabs').innerHTML = TABS.map(t=>{
  const col = t==='all' ? 'var(--ink)' : CAT[t].color;
  return `<button class="tab" data-tab="${t}" style="color:${col}">${TABNAME[t]}</button>`;
}).join('');
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>setTab(b.dataset.tab)));

document.getElementById('filters').innerHTML = TOPICS.map(t=>
  `<button class="fchip" data-topic="${t}">${TOPICNAME[t]}</button>`).join('');
document.querySelectorAll('.fchip').forEach(b=>b.addEventListener('click',()=>{curTopic=b.dataset.topic;render();}));

function setTab(t){curTab=t;render();}

function render(){
  document.querySelectorAll('.tab').forEach(b=>{
    const t=b.dataset.tab;
    const col = t==='all' ? 'var(--ink)' : CAT[t].color;
    if(t===curTab){b.style.background=col;b.style.color='#fff';b.style.borderColor=col;}
    else{b.style.background='#fff';b.style.color=col;b.style.borderColor=col;}
  });
  document.querySelectorAll('.fchip').forEach(b=>b.classList.toggle('on',b.dataset.topic===curTopic));
  const p=PULSE[curTab]; const m=MOOD[p[0]];
  document.getElementById('mdot').style.color=m[0];
  const w=document.getElementById('mword'); w.textContent=m[1]; w.style.color=m[0];
  document.getElementById('pline').textContent=p[1];
  const rows = STORIES.filter(s=>
    (curTab==='all'||s.cat===curTab) && (curTopic==='all'||s.topic===curTopic));
  document.getElementById('list').innerHTML = rows.map(s=>{
    const c=CAT[s.cat];
    return `<div class="card" style="border-left-color:${c.color}">
      <div class="chead" onclick="toggle(this)">
        <span class="ctag" style="background:${c.color}1a;color:${c.color}">${c.label}</span>
        <p class="chl"><a href="${s.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${s.hl}</a></p>
        <div class="crow"><span class="csrc">${s.src}</span><span class="exp">Tap to expand ▾</span></div>
      </div>
      <div class="cbody"><div class="cinner">
        <p class="summary">${s.sum}</p>
        <div class="wlabel">Why it matters</div>
        <div class="chips">${s.why.map(x=>`<span class="chip">${x}</span>`).join('')}</div>
        <div class="srcdiv"></div>
        <div class="srclabel">Source</div>
        <div class="srcrow">
          <span class="spill ${s.gold?'gold':''}">${s.src}</span>
          <a class="readlink" href="${s.url}" target="_blank" rel="noopener">Read →</a>
        </div>
      </div></div>
    </div>`;
  }).join('');
  document.getElementById('empty').style.display = rows.length? 'none':'block';
}

function toggle(head){
  const body=head.nextElementSibling;
  const open=body.classList.toggle('open');
  head.querySelector('.exp').textContent = open? 'Tap to collapse ▴':'Tap to expand ▾';
}

render();

document.getElementById('foot').innerHTML =
  '<b>Sources:</b> Bloomberg, CNBC, South China Morning Post (SCMP), Hong Kong Monetary Authority (HKMA). '+
  'Headlines link to the original reporting.<br><br>'+
  'Last updated: Thursday 16 July 2026 (HKT) · Daily Brief';
</script>
</body>
