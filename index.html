<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Daily Brief">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<title>Daily Brief</title>
<style>
  :root{
    --bg:#f5f7fb; --ink:#141a26; --sub:#6b7280; --card:#ffffff; --line:#eceff4;
    --amber:#b45309; --amber-bg:#fff3e0; --amber-fill:#d97706;
    --red:#b91c1c; --red-bg:#fde8e8; --red-fill:#dc2626;
    --blue:#1d4ed8; --blue-bg:#e8eefc; --blue-fill:#2563eb;
    --crimson:#9f1239; --crimson-bg:#fde7ed; --crimson-fill:#be123c;
    --teal:#0f766e; --teal-bg:#e3f6f4; --teal-fill:#0d9488;
    --emerald:#047857; --emerald-bg:#e3f7ee; --emerald-fill:#059669;
    --purple:#6d28d9; --purple-bg:#f0e9fd; --purple-fill:#7c3aed;
    --orange:#c2410c; --orange-bg:#fdead9; --orange-fill:#ea580c;
    --green:#15803d; --redtext:#dc2626;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom);
    padding-left:env(safe-area-inset-left); padding-right:env(safe-area-inset-right);
  }
  .wrap{max-width:520px; margin:0 auto; padding:0 16px 40px;}
  header.hero{padding:22px 0 14px;}
  .kicker{font-size:14px; color:var(--sub); margin:0 0 4px;}
  h1{font-size:26px; margin:0 0 6px; letter-spacing:-0.02em;}
  .date{font-size:14px; color:var(--sub); margin:0 0 12px;}
  .pill{
    display:inline-block; background:var(--card); border:1px solid var(--line);
    color:var(--ink); font-size:12.5px; font-weight:600; padding:6px 12px; border-radius:999px;
    box-shadow:0 1px 2px rgba(20,26,38,0.04);
  }
  .things{display:flex; flex-direction:column; gap:8px; margin:16px 0 18px;}
  .thing-card{
    display:flex; align-items:center; gap:12px; background:var(--card); border-radius:16px;
    padding:12px 14px; box-shadow:0 1px 3px rgba(20,26,38,0.06); border:1px solid var(--line);
    cursor:pointer; text-align:left;
  }
  .thing-icon{flex:0 0 auto; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border-radius:10px; background:#f2f4f9;}
  .thing-text{font-size:13.5px; line-height:1.35; font-weight:500;}
  .snapshot-label{font-size:11.5px; color:var(--sub); text-transform:uppercase; letter-spacing:.04em; margin:18px 0 8px; font-weight:700;}
  .snap-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px;}
  .snap-tile{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:9px 6px; text-align:center; box-shadow:0 1px 2px rgba(20,26,38,0.04);}
  .snap-name{font-size:10px; color:var(--sub); font-weight:600; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .snap-val{font-size:14px; font-weight:700; margin-bottom:2px;}
  .snap-chg{font-size:10.5px; font-weight:700;}
  .up{color:var(--green);} .down{color:var(--redtext);} .flat{color:var(--sub);}

  .sticky{
    position:sticky; top:0; z-index:30; background:var(--bg); padding-top:14px; margin:0 -16px; padding-left:16px; padding-right:16px;
    border-bottom:1px solid var(--line);
  }
  .tabs{display:flex; gap:6px; overflow-x:auto; padding-bottom:10px; scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex:0 0 auto; font-size:13px; font-weight:700; padding:8px 13px; border-radius:999px;
    border:1.5px solid transparent; background:transparent; white-space:nowrap; cursor:pointer;
  }
  .tab[data-cat="all"]{color:var(--ink); border-color:#dfe3ec;}
  .tab[data-cat="all"].active{background:var(--ink); color:#fff;}
  .tab[data-cat="top"]{color:var(--amber);} .tab[data-cat="top"].active{background:var(--amber-fill); color:#fff;}
  .tab[data-cat="hk"]{color:var(--red);} .tab[data-cat="hk"].active{background:var(--red-fill); color:#fff;}
  .tab[data-cat="us"]{color:var(--blue);} .tab[data-cat="us"].active{background:var(--blue-fill); color:#fff;}
  .tab[data-cat="china"]{color:var(--crimson);} .tab[data-cat="china"].active{background:var(--crimson-fill); color:#fff;}
  .tab[data-cat="global"]{color:var(--teal);} .tab[data-cat="global"].active{background:var(--teal-fill); color:#fff;}
  .tab[data-cat="uae"]{color:var(--emerald);} .tab[data-cat="uae"].active{background:var(--emerald-fill); color:#fff;}
  .tab[data-cat="tech"]{color:var(--purple);} .tab[data-cat="tech"].active{background:var(--purple-fill); color:#fff;}
  .tab[data-cat="crypto"]{color:var(--orange);} .tab[data-cat="crypto"].active{background:var(--orange-fill); color:#fff;}

  .filters{display:flex; gap:6px; overflow-x:auto; padding-bottom:12px; scrollbar-width:none;}
  .filters::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto; font-size:12px; font-weight:600; padding:6px 11px; border-radius:999px;
    background:var(--card); border:1px solid var(--line); color:var(--sub); cursor:pointer;
  }
  .chip.active{background:var(--ink); color:#fff; border-color:var(--ink);}

  .pulse{
    display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--line);
    border-radius:14px; padding:10px 14px; margin:14px 0; font-size:13px; box-shadow:0 1px 2px rgba(20,26,38,0.04);
  }
  .dot{width:9px; height:9px; border-radius:50%; flex:0 0 auto;}
  .dot.good{background:#16a34a;} .dot.steady{background:#d97706;} .dot.weak{background:#dc2626;}
  .pulse-word{font-weight:700; margin-right:2px;}

  .list{display:flex; flex-direction:column; gap:10px; margin-top:4px;}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:18px; padding:14px 16px;
    box-shadow:0 1px 3px rgba(20,26,38,0.06); cursor:pointer;
  }
  .cat-tag{
    display:inline-block; font-size:10.5px; font-weight:800; text-transform:uppercase; letter-spacing:.04em;
    padding:3px 9px; border-radius:7px; margin-bottom:8px;
  }
  .tag-top{color:var(--amber); background:var(--amber-bg);}
  .tag-hk{color:var(--red); background:var(--red-bg);}
  .tag-us{color:var(--blue); background:var(--blue-bg);}
  .tag-china{color:var(--crimson); background:var(--crimson-bg);}
  .tag-global{color:var(--teal); background:var(--teal-bg);}
  .tag-uae{color:var(--emerald); background:var(--emerald-bg);}
  .tag-tech{color:var(--purple); background:var(--purple-bg);}
  .tag-crypto{color:var(--orange); background:var(--orange-bg);}

  .headline{font-size:16px; font-weight:700; line-height:1.32; margin:0 0 9px;}
  .source-pill{
    display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:700;
    padding:4px 10px; border-radius:999px; background:#f2f4f9; color:var(--sub); margin-bottom:2px;
  }
  .source-pill.bloomberg{background:#fdf3d8; color:#92720a;}
  .chevron{margin-left:auto; color:#c3c8d4; font-size:13px; transition:transform .2s;}
  .card.open .chevron{transform:rotate(180deg);}
  .card-top{display:flex; align-items:flex-start; gap:8px;}
  .card-top-text{flex:1;}

  .detail{max-height:0; overflow:hidden; transition:max-height .25s ease;}
  .card.open .detail{max-height:600px;}
  .detail-inner{padding-top:12px;}
  .summary{font-size:13.5px; line-height:1.55; color:#374151; margin:0 0 10px;}
  .why-box{
    background:#eaf3fd; border-left:3px solid #2563eb; border-radius:8px; padding:10px 12px; margin-bottom:10px;
  }
  .why-label{font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:#1d4ed8; margin-bottom:6px;}
  .why-box ul{margin:0; padding-left:16px;}
  .why-box li{font-size:12.5px; line-height:1.5; color:#1f2d47; margin-bottom:4px;}
  .why-box li:last-child{margin-bottom:0;}
  .read-link{font-size:13px; font-weight:700; color:#2563eb; text-decoration:none;}

  .empty{text-align:center; color:var(--sub); font-size:13.5px; padding:40px 10px;}

  footer{margin-top:26px; font-size:11.5px; color:var(--sub); line-height:1.6; text-align:center;}
  footer .src{font-weight:600;}
</style>
</head>
<body>
<div class="wrap">

  <header class="hero">
    <p class="kicker">Good morning ☕️</p>
    <h1>Your Daily Brief</h1>
    <p class="date" id="todayDate">Thursday 16 July 2026</p>
    <span class="pill" id="readPill">≈ 7-min read · 20 stories · fresh (last 24h)</span>

  <div class="things" id="thingsList"></div>

  <div class="sticky">
    <div class="tabs" id="tabRow">
      <button class="tab active" data-cat="all">All</button>
      <button class="tab" data-cat="top">★ Top</button>
      <button class="tab" data-cat="hk">Hong Kong</button>

      <button class="chip" data-topic="banking">Banking</button>

  <div class="pulse" id="pulseBanner"></div>

  <div class="list" id="cardList"></div>
  <p class="empty" id="emptyState" style="display:none;">No stories match this filter combination today.</p>

  <footer>
    <p>Sources: <span class="src">Bloomberg, CNBC, SCMP, The Standard, HKMA</span></p>
    <p>Last updated 16 July 2026, Hong Kong time</p>
  </footer>
</div>

<script>
const CAT = {
  top:   {label:"Top Stories", tagClass:"tag-top",   pulse:"good",   text:"Cooler prices lifted stocks, even as oil and China growth worries linger."},
  hk:    {label:"Hong Kong",   tagClass:"tag-hk",    pulse:"good",   text:"Listings momentum and a tech rally kept sentiment upbeat."},
  us:    {label:"United States", tagClass:"tag-us",  pulse:"good",   text:"Stocks climbed across the board as Fed officials struck an easier tone."},
  china: {label:"China",       tagClass:"tag-china", pulse:"steady", text:"Growth cooled further but policymakers leaned harder into support."},
  global:{label:"Global",      tagClass:"tag-global",pulse:"steady", text:"Asia traded mixed while oil-driven inflation worries lingered."},
  uae:   {label:"UAE",         tagClass:"tag-uae",   pulse:"steady", text:"Energy strength offset lingering regional tension."},
  tech:  {label:"Tech/AI",     tagClass:"tag-tech",  pulse:"good",   text:"Chip and AI names extended their advance on strong demand signals."},
  crypto:{label:"Crypto",      tagClass:"tag-crypto",pulse:"weak",   text:"Bitcoin stayed under pressure from oil-driven inflation worries."}
};
const ALL_PULSE = {pulse:"good", text:"Wall Street's rally on cooling inflation set the tone, though oil and Gulf tensions kept risk in check."};

const stories = [
{cat:"top", topic:"policy", headline:"US inflation cools sharply, sending stocks to fresh highs",
 source:"CNBC", summary:"June consumer prices fell 0.4%, the sharpest monthly drop in over six years, pulling annual inflation down to 3.5%. The Dow, S&P 500 and Nasdaq all advanced on the news. Traders now see a growing chance the Fed shifts toward cuts.",
 why:["Softer inflation strengthens the case for the Fed to ease policy sooner, a direct driver of bank funding costs and loan margins.","Lower rate expectations tend to lift risk appetite for Hong Kong and Asian equities tied to US monetary policy.","A durable disinflation trend would ease pressure on corporate borrowing costs across banking and finance globally."],
 url:"https://www.cnbc.com/2026/07/15/stock-market-today-live-updates.html"},
{cat:"top", topic:"markets", headline:"China's economic growth slows to weakest pace since 2022",
 source:"Bloomberg", summary:"Second-quarter GDP growth missed market expectations, marking China's softest expansion since late 2022. The slowdown came despite Beijing's stimulus efforts earlier in the year. Officials pointed to uneven consumer demand as the key drag.",
 why:["A weaker mainland economy raises the odds of fresh PBOC easing, which flows directly through Hong Kong's banking and funding markets.","Softer China growth weighs on sentiment for HKEX-listed mainland companies and cross-border capital flows.","Persistent weak demand keeps pressure on Chinese banks' asset quality and loan growth outlooks."],
 url:"https://www.bloomberg.com/news/live-blog/2026-07-15/china-second-quarter-gdp-and-pboc-briefing"},
{cat:"top", topic:"energy", headline:"Oil climbs for a fourth day as US strikes on Iran threaten Hormuz shipping",

 why:["Sustained higher oil prices threaten to revive inflation just as central banks were gaining confidence it had peaked.","Energy-driven inflation risk complicates rate-cut timing for the Fed and other major central banks.","Higher energy costs disproportionately hit trade-dependent hubs like Hong Kong and mainland manufacturers."],
 url:"https://www.bloomberg.com/news/articles/2026-07-15/latest-oil-market-news-and-analysis-for-july-16"},

{cat:"hk", topic:"markets", headline:"Shein targets up to $3 billion Hong Kong listing by August",
 source:"Bloomberg", summary:"The fast-fashion giant is said to be seeking a Hong Kong IPO as soon as next month after clearing a mainland regulatory review. The deal could raise as much as $3 billion. It would rank among the city's largest listings this year.",
 why:["A Shein listing would add to Hong Kong's IPO revival, reinforcing HKEX's position as the region's top listing venue.","Large new listings deepen liquidity for underwriting banks and brokers active in Hong Kong capital markets.","Success here could encourage more large consumer and tech names to choose Hong Kong over US listings."],
 url:"https://www.bloomberg.com/news/articles/2026-07-13/shein-is-said-to-target-up-to-3-billion-hong-kong-ipo-by-august"},
{cat:"hk", topic:"markets", headline:"Hong Kong IPO market roars back, 87 new listings raise HK$346 billion in H1",
 source:"The Standard", summary:"Hong Kong logged 87 new listings in the first half of 2026, up 98% from a year earlier. Funds raised through IPOs surged 92% to HK$210.2 billion. The rebound cements the city's return as a top global listing venue.",
 why:["A stronger IPO pipeline directly boosts fee income for Hong Kong's investment banks, brokers and legal advisers.","Renewed listing activity signals improving confidence in Hong Kong as a financing hub versus rival exchanges.","Deeper new-issue volume supports HKEX trading revenue and the broader ecosystem of custodians and clearers."],
 url:"https://www.thestandard.com.hk/finance/article/336594/Hong-Kong-records-87-new-listings-in-1H-2026-up-98-percent-from-last-year"},
{cat:"hk", topic:"policy", headline:"PBOC, HKMA and SFC advance new electronic bond and FX trading platform for Hong Kong",

 why:["A dedicated FIC platform strengthens Hong Kong banks' access to onshore bond and currency liquidity.","Deeper mainland connectivity supports HKMA's push to grow offshore RMB business through the city.","New market infrastructure typically lifts trading volumes and revenue for HKEX and participating banks."],
 url:"https://www.hkma.gov.hk/eng/news-and-media/press-releases/2026/07/20260707-8/"},
{cat:"hk", topic:"markets", headline:"Xiaohongshu eyes Hong Kong IPO by year-end at $70 billion valuation",
 source:"The Standard", summary:"The Chinese social media platform is reportedly planning a Hong Kong listing before the end of 2026. The targeted valuation would be around $70 billion. It would be one of the year's most closely watched mainland tech debuts.",
 why:["A marquee tech listing would further cement Hong Kong's rebound as the preferred venue for Chinese consumer-tech IPOs.","Large offerings like this draw international investor flows back into Hong Kong equities.","Banks underwriting the deal stand to gain meaningfully from advisory and placement fees."],
 url:"https://www.thestandard.com.hk/finance/article/334909/Xiaohongshu-plans-for-Hong-Kong-IPO-by-year-end-targets-US70b-valuation-WSJ-reports"},
{cat:"hk", topic:"tech", headline:"Alibaba shares jump as Qwen AI model integrates into Apple Intelligence in China",

 why:["The deal validates Alibaba's AI strategy, a key swing factor for Hong Kong's tech-heavy Hang Seng Index.","Deeper Apple-Alibaba AI integration could accelerate mainland consumer AI adoption at scale.","Positive sentiment on Chinese AI champions tends to lift broader HKEX tech and internet valuations."],
 url:"https://www.bloomberg.com/news/articles/2026-07-15/stock-market-today-dow-s-p-live-updates"},

{cat:"us", topic:"policy", headline:"Fed Chair Warsh tells Senate inflation has been an unfair 'tax', pledges regime change",

{cat:"us", topic:"markets", headline:"Wall Street rallies as Dow, S&P and Nasdaq all advance on cooler inflation data",

 url:"https://www.cnbc.com/2026/07/14/stock-market-today-live-updates.html"},

{cat:"china", topic:"banking", headline:"PBOC injects record 1.4 trillion yuan via six-month liquidity tool",

{cat:"china", topic:"markets", headline:"China's deflationary run ends, but rebound driven by energy costs, not demand",

const snapshot = [
  {name:"S&P 500", val:"7,572.43", chg:"+0.4%", dir:"up"},
  {name:"Nasdaq", val:"26,269.23", chg:"+0.6%", dir:"up"},
  {name:"Dow", val:"52,659.18", chg:"+0.3%", dir:"up"},
  {name:"Hang Seng", val:"24,681.1", chg:"+0.3%", dir:"up"},
  {name:"USD/CNY", val:"7.15", chg:"flat", dir:"flat"},
  {name:"Bitcoin", val:"$61,761", chg:"-3.8%", dir:"down"},
  {name:"Dubai DFM", val:"~6,110", chg:"steady", dir:"flat"},
  {name:"US 10Y", val:"4.02%", chg:"-0.03", dir:"up"}
];

const things = [
  {cat:"top", text:"US inflation cooled sharply, sending Wall Street to fresh highs.", svg:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 17l5-5 4 4 8-9" stroke="#b45309" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'},
  {cat:"hk", text:"Shein and Xiaohongshu are lining up blockbuster Hong Kong listings.", svg:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 21V9l6-4 6 4v12M4 21h16M10 21v-6h4v6" stroke="#b91c1c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'},
  {cat:"tech", text:"Anthropic is prepping an IPO as AI chip demand keeps surging.", svg:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="#6d28d9" stroke-width="2"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1" stroke="#6d28d9" stroke-width="2" stroke-linecap="round"/></svg>'}
];

const thingsList = document.getElementById('thingsList');
things.forEach(t=>{
  const el = document.createElement('button');
  el.className = 'thing-card';
  el.innerHTML = `<span class="thing-icon">${t.svg}</span><span class="thing-text">${t.text}</span>`;
  el.addEventListener('click', ()=>{ setTab(t.cat); document.querySelector('.sticky').scrollIntoView({behavior:'smooth', block:'start'}); });
  thingsList.appendChild(el);
});

const snapGrid = document.getElementById('snapGrid');
snapshot.forEach(s=>{
  const el = document.createElement('div');
  el.className = 'snap-tile';
  const dirClass = s.dir === 'up' ? 'up' : (s.dir === 'down' ? 'down' : 'flat');
  el.innerHTML = `<div class="snap-name">${s.name}</div><div class="snap-val">${s.val}</div><div class="snap-chg ${dirClass}">${s.chg}</div>`;
  snapGrid.appendChild(el);
});

let currentTab = 'all';
let currentTopic = 'all';

function setTab(cat){
  currentTab = cat;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active', b.dataset.cat === cat));
  updatePulse();
  render();
}
function setTopic(topic){
  currentTopic = topic;
  document.querySelectorAll('.chip').forEach(b=>b.classList.toggle('active', b.dataset.topic === topic));
  render();
}

document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click', ()=>setTab(b.dataset.cat)));
document.querySelectorAll('.chip').forEach(b=>b.addEventListener('click', ()=>setTopic(b.dataset.topic)));

function updatePulse(){
  const banner = document.getElementById('pulseBanner');
  const info = currentTab === 'all' ? ALL_PULSE : CAT[currentTab];
  banner.innerHTML = `<span class="dot ${info.pulse}"></span><span class="pulse-word">${info.pulse === 'good' ? 'Good' : (info.pulse === 'steady' ? 'Steady' : 'Weak')}</span><span>${info.text}</span>`;
}

const cardList = document.getElementById('cardList');
function render(){
  cardList.innerHTML = '';
  const filtered = stories.filter(s => (currentTab === 'all' || s.cat === currentTab) && (currentTopic === 'all' || s.topic === currentTopic));
  document.getElementById('emptyState').style.display = filtered.length ? 'none' : 'block';
  filtered.forEach((s, idx) => {
    const meta = CAT[s.cat];
    const card = document.createElement('div');
    card.className = 'card';
    const isBloomberg = s.source === 'Bloomberg';
    card.innerHTML = `
      <div class="card-top">
        <div class="card-top-text">
          <span class="cat-tag ${meta.tagClass}">${meta.label}</span>
          <p class="headline">${s.headline}</p>
          <span class="source-pill ${isBloomberg ? 'bloomberg' : ''}">${s.source}</span>
        </div>
        <span class="chevron">▾</span>
      </div>
      <div class="detail">
        <div class="detail-inner">
          <p class="summary">${s.summary}</p>
          <div class="why-box">
            <div class="why-label">Why it matters</div>
            <ul>${s.why.map(w=>`<li>${w}</li>`).join('')}</ul>
          </div>
          <a class="read-link" href="${s.url}" target="_blank" rel="noopener">Read the full story →</a>
        </div>
      </div>
    `;
    card.addEventListener('click', (e)=>{
      if (e.target.closest('.read-link')) return;
      card.classList.toggle('open');
    });
    cardList.appendChild(card);
  });
}

updatePulse();
render();
</script>
