<title>Daily Brief</title>
<style>
  :root{

    --shadow:0 1px 2px rgba(20,26,38,.04), 0 4px 16px rgba(20,26,38,.06);

    --uae:#10b981; --tech:#8b5cf6; --crypto:#f97316; --neutral:#141a26;
    --good:#16a34a; --steady:#d97706; --weak:#dc2626;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,Segoe UI,Roboto,sans-serif;}
  body{padding-bottom:env(safe-area-inset-bottom);}
  .wrap{max-width:520px;margin:0 auto;padding:0 16px;}
  header.hero{padding:calc(env(safe-area-inset-top) + 20px) 16px 8px;max-width:520px;margin:0 auto;}
  .kicker{font-size:14px;color:var(--sub);font-weight:600;margin:0 0 2px;}
  h1.title{font-size:26px;margin:0 0 4px;font-weight:800;letter-spacing:-.02em;}
  .datestr{font-size:14px;color:var(--sub);margin:0 0 10px;}
  .readpill{display:inline-block;background:#fff;border:1px solid var(--border);color:var(--ink);
    font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:999px;box-shadow:var(--shadow);}
  .things{display:flex;flex-direction:column;gap:8px;margin:16px 0;}
  .thing-card{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:14px;
    padding:12px 14px;box-shadow:var(--shadow);border:1px solid var(--border);cursor:pointer;}
  .thing-card svg{flex:0 0 auto;}
  .thing-card .t{font-size:13.5px;line-height:1.35;font-weight:600;}
  .snap-label{font-size:11.5px;color:var(--sub);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin:18px 0 8px;}
  .snap-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:6px;}
  .tile{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:9px 6px;text-align:center;box-shadow:var(--shadow);}
  .tile .n{font-size:14px;font-weight:800;letter-spacing:-.02em;}
  .tile .lbl{font-size:9.5px;color:var(--sub);font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin-top:2px;}
  .tile .mv{font-size:10.5px;font-weight:700;margin-top:1px;}
  .up{color:var(--good);} .down{color:var(--weak);}
  .snap-note{font-size:11px;color:var(--sub);margin:2px 0 4px;}
  nav.sticky{position:sticky;top:0;z-index:20;background:var(--bg);padding-top:8px;
    padding-top:calc(env(safe-area-inset-top) * 0 + 8px);}
  .tabs{display:flex;gap:6px;overflow-x:auto;padding:6px 16px 8px;scrollbar-width:none;-ms-overflow-style:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{flex:0 0 auto;font-size:13px;font-weight:700;padding:7px 13px;border-radius:999px;
    border:1.5px solid transparent;background:#fff;white-space:nowrap;cursor:pointer;box-shadow:var(--shadow);}
  .chips{display:flex;gap:6px;overflow-x:auto;padding:0 16px 8px;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto;font-size:12px;font-weight:600;padding:5px 11px;border-radius:999px;
    background:#fff;border:1px solid var(--border);color:var(--sub);white-space:nowrap;cursor:pointer;}
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .pulse{margin:0 16px 10px;background:#fff;border:1px solid var(--border);border-radius:12px;
    padding:9px 13px;font-size:12.5px;font-weight:600;box-shadow:var(--shadow);display:flex;align-items:center;gap:7px;}
  .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;}
  .list{display:flex;flex-direction:column;gap:10px;padding:2px 16px 28px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 15px;box-shadow:var(--shadow);}
  .tag{display:inline-block;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;
    padding:3px 8px;border-radius:6px;margin-bottom:7px;}
  .headline{font-size:15.5px;font-weight:700;line-height:1.35;margin:0 0 8px;cursor:pointer;}
  .srcpill{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:3px 9px;
    border-radius:999px;background:#f1f3f8;color:#4b5563;margin-bottom:2px;}
  .srcpill.gold{background:#fdf3d8;color:#92700c;}
  .detail{max-height:0;overflow:hidden;transition:max-height .28s ease;}
  .detail.open{max-height:600px;}
  .detail-inner{padding-top:10px;}
  .summary{font-size:13.5px;line-height:1.55;color:#2a3140;margin:0 0 10px;}
  .why{background:#eaf3ff;border-left:3px solid #3b82f6;border-radius:8px;padding:9px 11px;margin-bottom:10px;}
  .why-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#2563eb;margin-bottom:5px;}
  .why ul{margin:0;padding-left:16px;}
  .why li{font-size:12.5px;line-height:1.5;color:#1e3a5f;margin-bottom:4px;}
  .why li:last-child{margin-bottom:0;}
  .readmore{display:inline-block;font-size:13px;font-weight:700;text-decoration:none;}
  .tapctl{font-size:11px;color:var(--sub);font-weight:600;margin-top:2px;}
  .empty{text-align:center;color:var(--sub);font-size:13px;padding:30px 16px;}
  footer{padding:10px 16px calc(env(safe-area-inset-bottom) + 24px);text-align:center;}
  footer .src{font-size:11px;color:var(--sub);line-height:1.6;}
  footer .upd{font-size:11px;color:var(--sub);margin-top:6px;font-weight:600;}
</style>
</head>

}

function buildThings(){
  const el = document.getElementById("thingsList");
  const top3 = STORIES.filter(s=>s.cat==="top").slice(0,3);
  el.innerHTML = top3.map((s,i)=>`
    <div class="thing-card" data-cat="${s.cat}">
      ${iconFor(i)}
      <div class="t">${s.headline}</div>
    </div>`).join("");
  [...el.children].forEach(c=>{
    c.addEventListener("click", ()=>{ setTab(c.dataset.cat); window.scrollTo({top:0,behavior:"smooth"}); });
  });
}

function buildSnapshot(){
  const el = document.getElementById("snapGrid");
  el.innerHTML = SNAPSHOT.map(t=>`
    <div class="tile">
      <div class="n">${t.n}</div>
      <div class="lbl">${t.lbl}</div>
      <div class="mv ${t.dir}">${t.dir==="up"?"▲":"▼"} ${t.mv}</div>
    </div>`).join("");
}

function buildTabs(){
  const el = document.getElementById("tabsRow");
  el.innerHTML = Object.keys(CATS).map(k=>`<div class="tab" data-tab="${k}" id="tab-${k}">${CATS[k].label}</div>`).join("");
  [...el.children].forEach(c=>c.addEventListener("click", ()=>setTab(c.dataset.tab)));
}

function buildChips(){
  const el = document.getElementById("chipsRow");
  el.innerHTML = TOPICS.map(t=>`<div class="chip" data-topic="${t}" id="chip-${t}">${TOPIC_LABELS[t]}</div>`).join("");
  [...el.children].forEach(c=>c.addEventListener("click", ()=>setTopic(c.dataset.topic)));
}

function styleTabs(){
  Object.keys(CATS).forEach(k=>{
    const el = document.getElementById("tab-"+k);
    if(k===activeTab){
      el.style.background = CATS[k].color;
      el.style.color = "#fff";
      el.style.borderColor = CATS[k].color;
    } else {
      el.style.background = "#fff";
      el.style.color = CATS[k].color;
      el.style.borderColor = "transparent";
    }
  });
}

function styleChips(){
  TOPICS.forEach(t=>{
    const el = document.getElementById("chip-"+t);
    el.classList.toggle("active", t===activeTopic);
  });
}

function updatePulse(){
  const p = PULSE[activeTab];
  const el = document.getElementById("pulseBanner");
  el.innerHTML = `<span class="dot" style="background:${MOOD_COLOR[p.mood]}"></span><span>● ${MOOD_WORD[p.mood]} — ${p.text}</span>`;
}

function setTab(t){ activeTab = t; styleTabs(); updatePulse(); renderList(); }
function setTopic(t){ activeTopic = t; styleChips(); renderList(); }

function renderList(){
  const el = document.getElementById("storyList");
  const filtered = STORIES.filter(s=>{
    const tabOk = activeTab==="all" || s.cat===activeTab;
    const topicOk = activeTopic==="all" || s.topic===activeTopic;
    return tabOk && topicOk;
  });
  if(filtered.length===0){
    el.innerHTML = `<div class="empty">No stories match this filter right now.</div>`;
    return;
  }
  el.innerHTML = filtered.map((s,idx)=>{
    const c = CATS[s.cat];
    const uid = "card"+idx+"_"+s.cat;
    return `
    <div class="card">
      <span class="tag" style="background:${c.color};color:#fff;">${c.label.replace("★ ","")}</span>
      <p class="headline" data-target="${uid}">${s.headline}</p>
      <span class="srcpill ${s.gold?'gold':''}">${s.source}</span>
      <div class="tapctl" data-target2="${uid}">Tap to expand ▾</div>
      <div class="detail" id="${uid}">
        <div class="detail-inner">
          <p class="summary">${s.summary}</p>
          <div class="why">
            <div class="why-lbl">Why it matters</div>
            <ul>${s.why.map(w=>`<li>${w}</li>`).join("")}</ul>
          </div>
          <a class="readmore" href="${s.url}" target="_blank" rel="noopener" style="color:${c.color}" onclick="event.stopPropagation()">Read the full story →</a>
        </div>
      </div>
    </div>`;
  }).join("");

  [...el.querySelectorAll(".headline, .tapctl")].forEach(node=>{
    node.addEventListener("click", ()=>{
      const id = node.dataset.target || node.dataset.target2;
      const d = document.getElementById(id);
      const ctl = d.previousElementSibling;
      d.classList.toggle("open");
      ctl.textContent = d.classList.contains("open") ? "Tap to collapse ▴" : "Tap to expand ▾";
    });
  });
}

buildThings();
buildSnapshot();
buildTabs();
buildChips();
styleTabs();
styleChips();
updatePulse();
renderList();
</script>
</body>
</html>
